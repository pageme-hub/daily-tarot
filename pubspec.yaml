name: daily_tarot
description: 매일타로 - 오늘의 카드 한 장
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  supabase_flutter: ^2.3.0
  google_mobile_ads: ^5.0.0
  go_router: ^14.0.0
  share_plus: ^7.2.0
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.0
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  permission_handler: ^11.0.0
  in_app_review: ^2.0.9
  gal: ^2.3.0
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/cards/default/
    - assets/images/cards/rider-waite/
    - assets/data/
    - .env
